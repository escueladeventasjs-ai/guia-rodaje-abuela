<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guía de Rodaje · Legado de Abuela</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f5efe7;
padding:20px;
color:#222;
margin:0;
}

h1{
font-size:34px;
margin-bottom:10px;
color:#7a4b36;
}

p{
font-size:18px;
line-height:1.5;
}

.bloque{
background:white;
border-radius:16px;
padding:18px;
margin-bottom:20px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

summary{
font-size:24px;
font-weight:bold;
cursor:pointer;
margin-bottom:12px;
}

label{
display:block;
margin:12px 0;
font-size:18px;
}

textarea{
width:100%;
min-height:100px;
border-radius:12px;
border:1px solid #ccc;
padding:12px;
font-size:16px;
margin-top:10px;
}

button{
width:100%;
padding:18px;
font-size:20px;
background:#7a4b36;
color:white;
border:none;
border-radius:14px;
margin-top:20px;
}

.check{
margin-right:10px;
transform:scale(1.3);
}

</style>
</head>

<body>

<h1>🎬 Guía de Rodaje</h1>

<p>
Checklist de grabación para Daniela y Abuela.
</p>

<div class="bloque">

<details open>

<summary>🟡 Día 1 — Infancia de Abuela</summary>

<label><input class="check" type="checkbox"> ¿Cómo eras tú de pequeña?</label>

<label><input class="check" type="checkbox"> ¿Cómo era tu casa?</label>

<label><input class="check" type="checkbox"> ¿A qué jugabas?</label>

<label><input class="check" type="checkbox"> ¿Ibas al cole?</label>

<label><input class="check" type="checkbox"> ¿Había móviles?</label>

<label><input class="check" type="checkbox"> ¿Qué hacías para divertirte?</label>

<textarea placeholder="Notas de rodaje..."></textarea>

</details>

</div>

<div class="bloque">

<details>

<summary>🟠 Día 2 — Familia y Juventud</summary>

<label><input class="check" type="checkbox"> ¿Cómo era tu mamá?</label>

<label><input class="check" type="checkbox"> ¿Y tu papá?</label>

<label><input class="check" type="checkbox"> ¿Tenías hermanos?</label>

<label><input class="check" type="checkbox"> ¿Jugabais juntos?</label>

<label><input class="check" type="checkbox"> ¿La vida era fácil o difícil?</label>

<textarea placeholder="Notas de rodaje..."></textarea>

</details>

</div>

<div class="bloque">

<details>

<summary>🟣 Día 3 — Abuelo y Boda</summary>

<label><input class="check" type="checkbox"> ¿Cómo conociste al abuelo?</label>

<label><input class="check" type="checkbox"> ¿Por qué te gustó?</label>

<label><input class="check" type="checkbox"> ¿Cómo era él?</label>

<label><input class="check" type="checkbox"> ¿Cómo fue tu boda?</label>

<label><input class="check" type="checkbox"> ¿Qué quieres que yo recuerde siempre del abuelo?</label>

<textarea placeholder="Notas de rodaje..."></textarea>

</details>

</div>

<div class="bloque">

<details>

<summary>🔵 Día 4 — Hijos y Gustavo</summary>

<label><input class="check" type="checkbox"> ¿Cómo era Gustavo de pequeño?</label>

<label><input class="check" type="checkbox"> ¿Era travieso?</label>

<label><input class="check" type="checkbox"> ¿Qué hacía que te hacía reír?</label>

<label><input class="check" type="checkbox"> ¿Cómo era la vida en 1976?</label>

<textarea placeholder="Notas de rodaje..."></textarea>

</details>

</div>

<div class="bloque">

<details>

<summary>🟢 Día 5 — Daniela y Legado</summary>

<label><input class="check" type="checkbox"> ¿Te acuerdas cuando nací?</label>

<label><input class="check" type="checkbox"> ¿Qué sentiste?</label>

<label><input class="check" type="checkbox"> ¿Qué quieres para mí?</label>

<label><input class="check" type="checkbox"> ¿Has sido feliz?</label>

<textarea placeholder="Notas de rodaje..."></textarea>

</details>

</div>

<button>
✅ Finalizar sesión
</button>

</body>
</html>
